name: Build & Deploy to SiteGround

on:
  push:
    branches:
      - master

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Deploy via SFTP (lftp)
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          # Write lftp script to a file to avoid shell escaping issues
          cat > /tmp/deploy.lftp << 'LFTP_SCRIPT'
          set sftp:connect-program "ssh -a -x -i /root/.ssh/deploy_key -o StrictHostKeyChecking=no -p 18765"
          set net:timeout 60
          set net:max-retries 5
          set net:reconnect-interval-base 5
          open sftp://$FTP_SERVER
          user $FTP_USERNAME ""
          cd www/aqmst.sg-host.com/public_html
          mirror -R --verbose --no-perms --delete --ignore-time ./dist/ ./
          put -O ./ ./dist/index.html
          quit
          LFTP_SCRIPT

          # Substitute env vars into the script
          sed -i "s|\$FTP_SERVER|$FTP_SERVER|g" /tmp/deploy.lftp
          sed -i "s|\$FTP_USERNAME|$FTP_USERNAME|g" /tmp/deploy.lftp
          sed -i "s|/root/.ssh/|$HOME/.ssh/|g" /tmp/deploy.lftp

          lftp -f /tmp/deploy.lftp
